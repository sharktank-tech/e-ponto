<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="{{ url_for('static', filename='images/soco-relogio.png') }}">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-black text-white px-4 py-3 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Painel Administrativo</h1>
      <ul class="flex gap-6">
        <li><a href="/" class="hover:underline">Home</a></li>
        <li><a href="{{ url_for('main.logout') }}" class="hover:underline">Sair</a></li>
      </ul>
    </div>
  </nav>

  <!-- Conteúdo Principal -->
  <main class="flex-grow container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Administração</h1>

    <!-- Gerenciar Usuários -->
    <section>
      <h2 class="text-2xl font-semibold text-gray-700 mb-4">Usuários</h2>
      <a href="{{ url_for('admin.add_user') }}" class="bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700 inline-block mb-6">
        + Adicionar Usuário
      </a>
      <div class="space-y-4">
        {% for user in users %}
          <div class="bg-white p-4 rounded shadow-md flex flex-col justify-between items-start">
            <div>
              <h3 class="text-lg font-bold text-gray-800">{{ user.username }}</h3>
              <p class="text-gray-600">{{ user.email }}</p>
            </div>

            <!-- Botões Editar e Excluir -->
            <div class="mt-4 w-full flex gap-3 justify-between">
              <!-- Botão Editar -->
              <a href="{{ url_for('admin.edit_user', id=user.id) }}" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition w-full text-center">
                Editar
              </a>
              <!-- Botão Excluir -->
              <form action="{{ url_for('admin.delete_user', id=user.id) }}" method="post" class="w-full">
                <button type="submit" class="bg-red-500 text-white py-2 px-4 rounded hover:bg-red-600 transition w-full text-center">
                  Excluir
                </button>
              </form>
            </div>
          </div>
        {% else %}
          <div class="bg-white p-4 rounded shadow-md text-center text-gray-600">
            Nenhum usuário encontrado.
          </div>
        {% endfor %}
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white text-center py-4 mt-8">
    <p class="text-sm">© 2024 Painel Administrativo. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
