<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Usuário</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='images/soco-relogio.png') }}">
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-black text-white px-4 py-2 flex justify-between items-center">
    <h1 class="text-xl font-bold">Painel Administrativo</h1>
    <ul class="flex gap-4">
      <li><a href="/" class="hover:underline">Home</a></li>
      <li><a href="{{ url_for('main.logout') }}" class="hover:underline">Sair</a></li>
    </ul>
  </nav>

  <!-- Conteúdo Principal -->
  <main class="mt-6 px-4 max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Editar Usuário</h1>

    <!-- Formulário de Edição de Usuário -->
    <form action="{{ url_for('admin.edit_user', id=user.id) }}" method="post" class="bg-white p-6 rounded shadow-md space-y-4">
      <div>
        <label for="username" class="block text-gray-700 font-semibold mb-1">Nome de Usuário</label>
        <input type="text" id="username" name="username" value="{{ user.username }}"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" required>
      </div>
      <div>
        <label for="email" class="block text-gray-700 font-semibold mb-1">E-mail</label>
        <input type="email" id="email" name="email" value="{{ user.email }}"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" required>
      </div>
      <div>
        <label for="password" class="block text-gray-700 font-semibold mb-1">Senha (Deixe em branco para não alterar)</label>
        <input type="password" id="password" name="password"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div class="flex justify-end">
        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg shadow-md hover:bg-blue-600 focus:ring-2 focus:ring-blue-400 focus:outline-none">
          Salvar Alterações
        </button>
      </div>
    </form>
  </main>

</body>
</html>
